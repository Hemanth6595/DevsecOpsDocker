version: "3"
services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/mongodb:1.0.0
    container_name: mongodb
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/redis:1.0.0
    container_name: redis
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/user:1.0.0
    container_name: user
    depends_on:
      - redis
  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/cart:1.0.0
    container_name: cart
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/frontend
    container_name: frontend
    depends_on:
      - catalogue
      - user
      - cart

networks:
  default:
    driver: bridge
    name: roboshop