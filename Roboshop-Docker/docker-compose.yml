services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/mongodb:1.0.0
    container_name: mongodb
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/redis:1.0.0
    container_name: redis
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/mysql:1.0.0
    container_name: mysql

  rabbitmq:
    build:
     context: ./rabbitmq
     dockerfile: Dockerfile
    image: hemanthkumargurujupalli/rabbitmq:1.0.0
    container_name: rabbitmq

    

  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  shipping:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/payment:1.0.0
    container_name: payment
    depends_on: 
      - rabbitmq
      - user
      - cart
    environment:
      - CART_HOST="cart"
        CART_PORT="8080"
        USER_HOST="user"
        USER_PORT="8080"
        AMQP_HOST="rabbitmq"
        AMQP_USER="roboshop"
        AMQP_PASS="roboshop123"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hemanthkumargurujupalli/frontend
    container_name: frontend
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment
    ports:
      - "80:80"

    

networks:
  default:
    driver: bridge
    name: roboshop


   