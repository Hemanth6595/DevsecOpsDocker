version: "3"
services:
  catalogue:
    build:
      context: .
      dockerfile: catalogue.Dockerfile
    image: hemanthkumargurujupalli/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  mongodb:
   build:
    context: .
    dockerfile: mongodb.Dockerfile # it moves the mongodb directory
   image: hemanthkumargurujupalli/mongodb:1.0.0 # docker build -t hemanthkumargurujupalli/mongodb:1.0.0
   container_name: mongodb
   
networks:
   default: 
     driver: bridge
     name: roboshop
     external: false # if true, you need to create network manully
  